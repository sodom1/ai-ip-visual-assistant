<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI IP 视觉设定助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{
    --ink: #191C29;
    --ink-2: #23273A;
    --ink-line: #3A3F58;
    --paper: #F4EEDC;
    --paper-2: #EAE2C8;
    --paper-line: #D8CBA0;
    --vermilion: #B23E1F;
    --vermilion-dim: #8C3119;
    --jade: #52796F;
    --text-hi: #F4EEDC;
    --text-lo: #A9AEC4;
    --text-ink: #2B2515;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--ink);
    color: var(--text-hi);
    font-family: 'Noto Sans SC', sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--ink-line);
    text-align:center;
    background: linear-gradient(180deg, var(--ink) 0%, var(--ink) 85%, var(--ink-2) 100%);
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.28em;
    color: var(--jade);
    text-transform: uppercase;
    margin-bottom:10px;
    font-weight:500;
  }
  h1{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size: clamp(24px, 5vw, 34px);
    margin:0 0 10px;
    letter-spacing:0.02em;
  }
  header p{
    margin:0 auto;
    max-width: 520px;
    color: var(--text-lo);
    font-size:14.5px;
    line-height:1.7;
  }

  /* ---------- Main layout ---------- */
  main{
    flex:1;
    width:100%;
    max-width: 720px;
    margin: 0 auto;
    display:flex;
    flex-direction:column;
    min-height:0;
    padding: 0 16px;
  }

  #examples{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    padding: 18px 0 6px;
  }
  .chip{
    border:1px solid var(--ink-line);
    background: var(--ink-2);
    color: var(--text-hi);
    font-family:'Noto Sans SC', sans-serif;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition: border-color .15s ease, transform .15s ease;
  }
  .chip:hover{ border-color: var(--jade); transform: translateY(-1px); }

  #chat{
    flex:1;
    overflow-y:auto;
    padding: 16px 0 8px;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
  }

  .msg{
    max-width: 88%;
    font-size:15px;
    line-height:1.75;
    padding: 13px 16px;
    border-radius:4px;
    white-space:normal;
  }
  .msg p{ margin: 0 0 10px; }
  .msg p:last-child{ margin-bottom:0; }
  .msg ul, .msg ol{ margin:8px 0; padding-left:20px; }
  .msg li{ margin-bottom:4px; }
  .msg h1,.msg h2,.msg h3{
    font-family:'Noto Serif SC', serif;
    margin: 4px 0 8px;
    line-height:1.4;
  }
  .msg h2{ font-size:18px; }
  .msg h3{ font-size:15.5px; color: var(--vermilion); }
  .msg strong{ color: var(--vermilion); font-weight:700; }

  .msg-user{
    align-self:flex-end;
    background: var(--ink-2);
    border: 1px solid var(--ink-line);
    color: var(--text-hi);
    border-radius: 12px 12px 2px 12px;
  }
  .msg-assistant{
    align-self:flex-start;
    background: var(--paper);
    color: var(--text-ink);
    border-radius: 2px 12px 12px 12px;
    position:relative;
  }
  .msg-assistant h3{ color: var(--vermilion-dim); }
  .msg-assistant strong{ color: var(--vermilion-dim); }

  .msg-loading{
    display:flex;
    gap:5px;
    align-items:center;
    padding: 16px 18px;
  }
  .msg-loading span{
    width:6px; height:6px; border-radius:50%;
    background: var(--text-ink);
    opacity:0.35;
    animation: blink 1.1s infinite ease-in-out;
  }
  .msg-loading span:nth-child(2){ animation-delay:.15s; }
  .msg-loading span:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{opacity:.25} 40%{opacity:.9} }

  /* ---------- Signature moment: 设定卡 ---------- */
  .msg-card{
    max-width: 100%;
    background: var(--paper);
    border: 1px solid var(--paper-line);
    box-shadow: 0 1px 0 var(--paper-line), 0 14px 30px -18px rgba(0,0,0,0.6);
    padding: 26px 22px 20px;
  }
  .msg-card::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1px dashed var(--paper-line);
    pointer-events:none;
  }
  .seal{
    position:absolute;
    top:14px; right:18px;
    width:46px; height:46px;
    border:2px solid var(--vermilion);
    border-radius:6px;
    color: var(--vermilion);
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    transform: rotate(-7deg);
    opacity:0.85;
  }
  .copy-btn{
    margin-top:14px;
    border:1px solid var(--vermilion);
    background:transparent;
    color: var(--vermilion-dim);
    font-family:'Noto Sans SC', sans-serif;
    font-size:13px;
    font-weight:500;
    padding:8px 16px;
    border-radius:999px;
    cursor:pointer;
    transition: background .15s ease, color .15s ease;
  }
  .copy-btn:hover{ background: var(--vermilion); color:#fff; }

  /* ---------- Composer ---------- */
  #composerWrap{
    padding: 14px 0 22px;
    border-top: 1px solid var(--ink-line);
    background: var(--ink);
  }
  #cardBtn{
    display:none;
    align-items:center;
    gap:6px;
    margin-bottom:10px;
    border:1px solid var(--jade);
    background:transparent;
    color: var(--jade);
    font-family:'Noto Sans SC', sans-serif;
    font-size:13px;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
  }
  #cardBtn:hover{ background: var(--jade); color: var(--ink); }
  #composer{
    display:flex;
    gap:10px;
    align-items:flex-end;
  }
  textarea{
    flex:1;
    resize:none;
    background: var(--ink-2);
    border: 1px solid var(--ink-line);
    color: var(--text-hi);
    font-family:'Noto Sans SC', sans-serif;
    font-size:14.5px;
    line-height:1.6;
    padding: 12px 14px;
    border-radius: 10px;
    min-height:48px;
    max-height:140px;
  }
  textarea:focus{ outline:none; border-color: var(--jade); }
  textarea::placeholder{ color: var(--text-lo); }
  #sendBtn{
    background: var(--vermilion);
    color:#fff;
    border:none;
    font-family:'Noto Sans SC', sans-serif;
    font-weight:500;
    font-size:14px;
    padding: 13px 20px;
    border-radius:10px;
    cursor:pointer;
    transition: background .15s ease;
  }
  #sendBtn:hover{ background: var(--vermilion-dim); }
  #sendBtn:disabled, #cardBtn:disabled{ opacity:0.45; cursor:not-allowed; }

  footer{
    text-align:center;
    font-size:11.5px;
    color: var(--text-lo);
    padding: 10px 0 16px;
  }

  @media (max-width: 480px){
    .msg{ max-width:94%; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">文创 IP 前期开发 · 创意工作台</div>
  <h1>AI IP 视觉设定助手</h1>
  <p>从一句模糊的文化想法出发，一步步理清方向、拆解文化元素、设定视觉风格，最后整理成一份完整的角色设定与提示词方案。</p>
</header>

<main>
  <div id="examples">
    <button class="chip" data-text="我想做一个客家非遗相关的文创 IP，但不知道从哪里开始。">客家非遗文创 IP</button>
    <button class="chip" data-text="我想做一个古事纪神话角色，风格偏东方奇幻。">古事纪神话角色</button>
    <button class="chip" data-text="我想做一个敦煌壁画主题的 IP 形象。">敦煌壁画 IP</button>
    <button class="chip" data-text="我想做苗绣主题的文创产品系列。">苗绣文创系列</button>
  </div>

  <div id="chat"></div>

  <div id="composerWrap">
    <button id="cardBtn" type="button">📋 基于目前讨论，生成完整设定卡</button>
    <form id="composer">
      <textarea id="userInput" placeholder="说出你的文化 IP 想法，比如：我想做一个客家非遗 IP……" rows="1"></textarea>
      <button id="sendBtn" type="submit">发送</button>
    </form>
  </div>
</main>

<footer>AI 生成内容仅供创意参考，具体文化细节建议自行核实后使用。</footer>

<script>
  marked.setOptions({ breaks: true });

  const chatEl = document.getElementById('chat');
  const formEl = document.getElementById('composer');
  const inputEl = document.getElementById('userInput');
  const exampleWrap = document.getElementById('examples');
  const cardBtn = document.getElementById('cardBtn');
  const sendBtn = document.getElementById('sendBtn');

  let messages = [];
  let awaitingCard = false;

  const GREETING = "你好，我是 **AI IP 视觉设定助手**。\n\n告诉我一个你想做的文化 IP 方向——哪怕只是一句很模糊的想法，我会一步步帮你理清方向、拆解可用的文化元素、设定角色外观与色彩风格，最后整理成一套完整的设定卡和 AI 绘图提示词。\n\n可以直接打字，也可以点上面的示例试试看。";

  function addMessageToUI(role, content, opts = {}) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + role + (opts.isCard ? ' msg-card' : '');
    if (role === 'assistant') {
      div.innerHTML = marked.parse(content);
      if (opts.isCard) {
        const seal = document.createElement('div');
        seal.className = 'seal';
        seal.textContent = '定';
        div.appendChild(seal);
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.type = 'button';
        copyBtn.textContent = '复制设定卡内容';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(content);
          copyBtn.textContent = '已复制 ✓';
          setTimeout(() => (copyBtn.textContent = '复制设定卡内容'), 1600);
        };
        div.appendChild(copyBtn);
      }
    } else {
      div.textContent = content;
    }
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function addLoading() {
    const div = document.createElement('div');
    div.className = 'msg msg-assistant msg-loading';
    div.id = 'loadingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }
  function removeLoading() {
    const el = document.getElementById('loadingIndicator');
    if (el) el.remove();
  }

  async function sendToAPI() {
    addLoading();
    sendBtn.disabled = true;
    cardBtn.disabled = true;
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      removeLoading();
      if (!res.ok) throw new Error(data.error || '请求失败');
      messages.push({ role: 'assistant', content: data.reply });
      addMessageToUI('assistant', data.reply, { isCard: awaitingCard });
    } catch (err) {
      removeLoading();
      addMessageToUI('assistant', '⚠️ 暂时无法获取回复（' + err.message + '），请稍后重试，或检查后台 API Key 配置。');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      cardBtn.disabled = false;
      awaitingCard = false;
    }
  }

  function revealComposerExtras() {
    exampleWrap.style.display = 'none';
    cardBtn.style.display = 'inline-flex';
  }

  formEl.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text) return;
    revealComposerExtras();
    messages.push({ role: 'user', content: text });
    addMessageToUI('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendToAPI();
  });

  cardBtn.addEventListener('click', () => {
    const text = '请基于目前为止的讨论，直接为我汇总输出一份完整的《IP 视觉设定卡》，按标准结构呈现，方便我直接复制使用。';
    messages.push({ role: 'user', content: text });
    addMessageToUI('user', '📋 生成完整设定卡');
    awaitingCard = true;
    sendToAPI();
  });

  exampleWrap.querySelectorAll('.chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.dataset.text;
      formEl.requestSubmit();
    });
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      formEl.requestSubmit();
    }
  });

  // 首次加载：展示开场白（本地静态文案，不消耗 API 调用）
  addMessageToUI('assistant', GREETING);
</script>

</body>
</html>
